<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cronograma de Proyecto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --plum:#391a36;
    --orchid:#7a4b7d;
    --mauve:#ad92af;
    --guinda:#7a1f2b;
    --gold:#cf9f4d;
    --ink:#2a1f28;
    --muted:#8d8290;
    --line:#ece7ea;
    --paper:#ffffff;
    --bg:#f6f4f6;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter','Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:32px;
    -webkit-font-smoothing:antialiased;
  }
  .app{ max-width:1360px; margin:0 auto; }

  .brandbar{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--plum);
    border-radius:var(--radius);
    padding:18px 24px;
    margin-bottom:18px;
  }
  .brandbar img{ height:38px; display:block; }
  .brandbar .divider{ width:1px; height:32px; background:rgba(255,255,255,.25); }
  .brandbar .titlewrap{ flex:1; min-width:0; }
  .brandbar input#projectTitle{
    font-family:inherit;
    font-size:19px;
    font-weight:700;
    color:#fff;
    background:transparent;
    border:none;
    border-bottom:1px dashed transparent;
    outline:none;
    width:100%;
    padding:2px 0;
    cursor:text;
    transition:border-color .15s ease;
  }
  .brandbar input#projectTitle:hover,
  .brandbar input#projectTitle:focus{ border-bottom-color:rgba(255,255,255,.5); }
  .brandbar input#projectTitle::placeholder{ color:rgba(255,255,255,.55); }
  .brandbar .sub{ font-size:12px; color:rgba(255,255,255,.6); margin-top:1px; }

  .topbar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:18px;
  }
  .toolbar{ display:flex; gap:8px; }
  .toolbar button{
    font-family:inherit; font-size:13px; font-weight:600;
    border:1px solid var(--line); background:#fff; color:var(--plum);
    border-radius:10px; padding:9px 16px; cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:all .15s ease;
  }
  .toolbar button:hover{ border-color:var(--orchid); box-shadow:0 2px 10px rgba(57,26,54,.12); }

  .card{
    background:var(--paper);
    border-radius:var(--radius);
    border:1px solid var(--line);
    padding:22px;
    margin-bottom:18px;
  }

  /* --- Add task bar --- */
  .add-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--muted); font-weight:600;
  }
  .field input{
    font-family:inherit; font-size:13.5px;
    border:1px solid var(--line); border-radius:9px;
    padding:8px 10px; background:#fbfafb;
    min-width:0;
  }
  .field input:focus{ outline:none; border-color:var(--orchid); background:#fff; }
  #inpName{ width:220px; }
  #inpStart{ width:150px; }
  #inpDays{ width:80px; }

  .swatches{ display:flex; gap:6px; align-items:center; }
  .swatch{
    width:24px; height:24px; border-radius:50%;
    cursor:pointer; border:2px solid transparent;
    transition:transform .12s ease;
  }
  .swatch:hover{ transform:scale(1.12); }
  .swatch.active{ border-color:var(--ink); }

  .btn-add{
    background:var(--plum); color:#fff; border:none;
    border-radius:9px; padding:9px 18px; font-size:13.5px; font-weight:600;
    cursor:pointer; margin-left:auto;
  }
  .btn-add:hover{ opacity:.88; }

  /* --- Gantt --- */
  #ganttScroll{ overflow-x:auto; padding-bottom:6px; }
  .gantt{ min-width:900px; }

  .row-head{
    display:grid;
    grid-template-columns: 210px 1fr;
  }
  .days-head{ overflow:hidden; }

  .month-strip, .date-strip, .dow-strip{
    display:grid;
  }
  .month-strip div, .date-strip div, .dow-strip div{
    text-align:center;
    padding:6px 2px;
    font-size:11.5px;
    border-bottom:1px solid var(--line);
  }
  .month-strip div{
    font-weight:700; color:var(--plum); font-size:12px;
    border-bottom:none; padding-bottom:4px;
  }
  .date-strip div{ color:var(--muted); font-weight:500; }
  .dow-strip div{
    font-weight:600; color:var(--mauve); font-size:10.5px;
    padding-top:2px; padding-bottom:8px;
  }
  .dow-strip div.weekend{ color:var(--guinda); }

  .task-row{
    display:grid;
    grid-template-columns: 210px 1fr;
    align-items:center;
    min-height:52px;
    border-top:1px solid var(--line);
  }
  .task-row:first-of-type{ border-top:none; }

  .task-meta{
    display:flex; align-items:center; gap:10px;
    padding-right:12px;
  }
  .task-dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  .task-name{ font-size:13.5px; font-weight:600; color:var(--ink); }
  .task-days{ font-size:11px; color:var(--muted); margin-top:1px; }

  .task-remove{
    margin-left:auto;
    width:22px; height:22px; border-radius:50%;
    border:none; background:transparent; color:var(--muted);
    cursor:pointer; font-size:14px; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .task-remove:hover{ background:#f2eef2; color:var(--guinda); }

  .track{
    display:grid;
    position:relative;
    height:52px;
  }
  .track-cell{
    border-left:1px solid var(--line);
    height:100%;
  }
  .track-cell:last-child{ border-right:1px solid var(--line); }
  .track-cell.weekend{ background:#faf7f9; }

  .pill{
    position:absolute;
    top:10px;
    height:32px;
    border-radius:9px;
    box-shadow:0 2px 6px rgba(57,26,54,.14);
  }

  .empty-msg{
    text-align:center; color:var(--mauve); padding:50px 20px; font-size:14px;
  }

  @media (max-width:760px){
    .add-row{ align-items:flex-start; }
    .btn-add{ margin-left:0; width:100%; }
  }
</style>
</head>

AAAAebIcAAAAAAAAAAAAAAAAAAAAAADyZDkAAAAAAAAAAAAAAAAAAAAAAOTJcgAAAAAAAAAAAAAAAAAAAAAAyJPlAAAAAAAAAAAAAAAAAAAAAACQJ8sBAAAAAAAAAAAAAAAAAAAAACBPlgMAAAAAAAAAAAAAAAAAAAAAQJ4sBwAAAAAAAAAAAAAAAAAAAACAPFkOAAAAAAAAAAAAAAAAAAAAAAB5shwAAAAAAAAAAAAAAAAAAAAAAPJkOQAAAAAAAAAAAAAAAAAAAAAA5MlyAAAAAAAAAAAAAAAAAAAAAADIk+UAAAAAAAAAAAAAAAAAAAAAAJAnywEAAAAAAAAAAAAAAAAAAAAAIE+WAwAAAAAAAAAAAAAAAAAAAABAniwHAAAAAAAAAAAAAAAAAAAAAIA8WQ4AAAAAAAAAAAAAAAAAAAAAAHmyHAAAAAAAAAAAAAAAAAAAAAAA8mQ5AAAAAAAAAAAAAAAAAAAAAADkyXIAAAAAAAAAAAAAAAAAAAAAAMiT5QAAAAAAAAAAAAAAAAAAAAAAkCfLAQAAAAAAAAAAAAAAAAAAAAAgT5YDAAAAAAAAAAAAAAAAAAAAAECeLAcAAAAAAAAAAAAAAAAAAAAAgDxZDgAAAAAAAAAAAAAAAAAAAAAAebIcAAAAAAAAAAAAAAAAAAAAAADyZDkAAAAAAAAAAAAAAAAAAAAAAOTJcgAAAAAAAAAAAAAAAAAAAAAAyJPlAAAAAAAAAAAAAAAAAAAAAACQJ8sBAAAAAAAAAAAAAAAAAAAAACBPlgMAAAAAAAAAAAAAAAAAAAAAQJ4sBwAAAAAAAAAAAAAAAAAAAACAPFkOAAAAAAAAAAAAAAAAAAAAAAB5shwAAAAAAAAAAAAAAAAAAAAAAPJkOQAAAAAAAAAAAAAAAAAAAAAA5MlyAAAAAAAAAAAAAAAAAAAAAADIk+UAAAAAAAAAAAAAAAAAAAAAAJAnywEAAAAAAAAAAAAAAAAAAAAAIE+WAwAAAAAAAAAAAAAAAAAAAABAniwHAAAAAAAAAAAAAAAAAAAAAIC2bQfYGZ2GoyyZKQAAAABJRU5ErkJggg==" alt="Silana Research Boutique">
    <div class="divider"></div>
    <div class="titlewrap">
      <input id="projectTitle" type="text" value="Cronograma de Proyecto" placeholder="Nombre del proyecto">
      <div class="sub" id="rangeLabel">Agrega tareas para comenzar</div>
    </div>
  </div>

  <div class="topbar" data-html2canvas-ignore="true">
    <div class="toolbar">
      <button onclick="exportPNG()">⬇ PNG</button>
      <button onclick="exportPDF()">⬇ PDF</button>
    </div>
  </div>

  <div class="card" data-html2canvas-ignore="true">
    <div class="add-row">
      <div class="field">
        <label>Tarea</label>
        <input id="inpName" type="text" placeholder="Nombre de la tarea">
      </div>
      <div class="field">
        <label>Inicio</label>
        <input id="inpStart" type="date">
      </div>
      <div class="field">
        <label>Días hábiles</label>
        <input id="inpDays" type="number" min="1" value="1">
      </div>
      <div class="field">
        <label>Color</label>
        <div class="swatches" id="swatchRow"></div>
      </div>
      <button class="btn-add" onclick="addTask()">+ Agregar tarea</button>
    </div>
  </div>

  <div class="card">
    <div id="ganttScroll">
      <div id="ganttHost"></div>
    </div>
  </div>

</div>

<script>
const DOW = ['D','L','M','MI','J','V','S'];
const MONTHS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const PALETTE = ['#391a36','#7a4b7d','#ad92af','#7a1f2b','#cf9f4d'];
let selectedColor = PALETTE[0];

let tasks = [
  {name:'Diseño del proyecto', start:'2026-07-10', days:1, color:'#391a36'},
  {name:'Programación', start:'2026-07-10', days:2, color:'#391a36'},
  {name:'Levantamiento', start:'2026-07-12', days:6, color:'#7a4b7d'},
  {name:'Procesamiento', start:'2026-07-20', days:2, color:'#ad92af'},
  {name:'Análisis y Presentación', start:'2026-07-24', days:2, color:'#7a1f2b'},
];

function isWeekend(d){ const dow = d.getDay(); return dow===0 || dow===6; }

function parseDate(str){
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function sameDay(a,b){ return fmtDate(a) === fmtDate(b); }

function workingDaySpan(startDate, workDays){
  let dates = [];
  let cur = new Date(startDate);
  let guard = 0;
  while(dates.length < workDays && guard < 5000){
    if(!isWeekend(cur)) dates.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
    guard++;
  }
  return dates;
}

function initSwatches(){
  const row = document.getElementById('swatchRow');
  row.innerHTML = PALETTE.map((c,i)=>
    `<div class="swatch ${c===selectedColor?'active':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c){
  selectedColor = c;
  initSwatches();
}

function addTask(){
  const name = document.getElementById('inpName').value.trim();
  const start = document.getElementById('inpStart').value;
  const days = parseInt(document.getElementById('inpDays').value) || 1;
  if(!name || !start){
    alert('Ingresa el nombre y la fecha de inicio de la tarea.');
    return;
  }
  tasks.push({name, start, days, color:selectedColor});
  document.getElementById('inpName').value = '';
  render();
}

function removeTask(idx){
  tasks.splice(idx,1);
  render();
}

function render(){
  const host = document.getElementById('ganttHost');
  const rangeLabel = document.getElementById('rangeLabel');

  if(tasks.length === 0){
    host.innerHTML = '<div class="empty-msg">No hay tareas todavía. Agrega una arriba para ver el cronograma.</div>';
    rangeLabel.textContent = 'Agrega tareas para comenzar';
    return;
  }

  const spans = tasks.map(t => ({
    task: t,
    occ: workingDaySpan(parseDate(t.start), t.days)
  }));

  let minDate = spans[0].occ[0];
  let maxDate = spans[0].occ[spans[0].occ.length-1];
  spans.forEach(({occ})=>{
    if(occ[0] < minDate) minDate = occ[0];
    if(occ[occ.length-1] > maxDate) maxDate = occ[occ.length-1];
  });

  let calDays = [];
  let cur = new Date(minDate);
  while(cur <= maxDate){
    calDays.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  const N = calDays.length;

  rangeLabel.textContent = `${fmtDate(minDate)} → ${fmtDate(maxDate)} · ${tasks.length} tarea${tasks.length>1?'s':''}`;

  const gridCols = `repeat(${N}, minmax(38px, 1fr))`;

  let monthGroups = [];
  calDays.forEach(d=>{
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if(monthGroups.length===0 || monthGroups[monthGroups.length-1].key !== key){
      monthGroups.push({key, label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`, count:1});
    } else {
      monthGroups[monthGroups.length-1].count++;
    }
  });

  let html = '<div class="gantt">';

  html += `<div class="row-head">
    <div class="side-head"></div>
    <div class="days-head">
      <div class="month-strip" style="grid-template-columns:${gridCols}">`;
  monthGroups.forEach(mg=>{
    html += `<div style="grid-column: span ${mg.count}">${mg.label}</div>`;
  });
  html += `</div>
      <div class="date-strip" style="grid-template-columns:${gridCols}">`;
  calDays.forEach(d=>{
    html += `<div>${String(d.getDate()).padStart(2,'0')}</div>`;
  });
  html += `</div>
      <div class="dow-strip" style="grid-template-columns:${gridCols}">`;
  calDays.forEach(d=>{
    html += `<div class="${isWeekend(d)?'weekend':''}">${DOW[d.getDay()]}</div>`;
  });
  html += `</div>
    </div>
  </div>`;

  spans.forEach(({task, occ}, idx)=>{
    let segments = [];
    let segStart = 0;
    for(let i=1;i<=occ.length;i++){
      const prevIdx = calDays.findIndex(d => sameDay(d, occ[i-1]));
      const curIdx = i < occ.length ? calDays.findIndex(d => sameDay(d, occ[i])) : -1;
      if(i === occ.length || curIdx !== prevIdx + 1){
        segments.push({from: segStart, to: i-1});
        segStart = i;
      }
    }

    html += `<div class="task-row">
      <div class="task-meta">
        <div class="task-dot" style="background:${task.color}"></div>
        <div>
          <div class="task-name">${task.name}</div>
          <div class="task-days">${task.days} día${task.days>1?'s':''} hábil${task.days>1?'es':''}</div>
        </div>
        <button class="task-remove" data-html2canvas-ignore="true" onclick="removeTask(${idx})">✕</button>
      </div>
      <div class="track" style="grid-template-columns:${gridCols}">`;

    calDays.forEach(d=>{
      html += `<div class="track-cell ${isWeekend(d)?'weekend':''}"></div>`;
    });

    segments.forEach(seg=>{
      const fromIdx = calDays.findIndex(d => sameDay(d, occ[seg.from]));
      const span = seg.to - seg.from + 1;
      const leftPct = (fromIdx / N) * 100;
      const widthPct = (span / N) * 100;
      html += `<div class="pill" style="left:calc(${leftPct}% + 3px); width:calc(${widthPct}% - 6px); background:${task.color}"></div>`;
    });

    html += `</div></div>`;
  });

  html += '</div>';
  host.innerHTML = html;
}

document.getElementById('inpStart').value = fmtDate(new Date());
initSwatches();
render();

async function exportPNG(){
  const el = document.getElementById('captureArea');
  const canvas = await html2canvas(el, {scale:2, backgroundColor:'#f6f4f6'});
  const link = document.createElement('a');
  const name = (document.getElementById('projectTitle').value || 'cronograma').trim().replace(/\s+/g,'_');
  link.download = `${name}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function exportPDF(){
  const el = document.getElementById('captureArea');
  const canvas = await html2canvas(el, {scale:2, backgroundColor:'#ffffff'});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const orientation = canvas.width > canvas.height ? 'l' : 'p';
  const pdf = new jsPDF(orientation, 'pt', [canvas.width, canvas.height]);
  pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
  const name = (document.getElementById('projectTitle').value || 'cronograma').trim().replace(/\s+/g,'_');
  pdf.save(`${name}.pdf`);
}
</script>
</body>
</html>
